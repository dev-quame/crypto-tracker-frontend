<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">SignalCrypt favicon</title>
  <desc id="desc">Rounded dark square with amber upward signal mark and SC monogram.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1a29" />
      <stop offset="1" stop-color="#0a121d" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b" />
      <stop offset="1" stop-color="#fbbf24" />
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)" />

  <path d="M16 42 L26 32 L33 37 L46 22" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M40 22 H46 V28" fill="none" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

  <text x="18" y="52" fill="#e8f0f8" font-size="13" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" letter-spacing="0.8">SC</text>
</svg>
